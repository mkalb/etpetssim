# Allows Gradle to execute independent tasks/projects in parallel.
org.gradle.parallel            = true

# Enables reuse of task outputs between builds.
org.gradle.caching             = true

# Enables Gradle to show all deprecation warnings.
org.gradle.warning.mode        = all
